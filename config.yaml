# IndoStockBot Configuration

strategy:
  initial_capital: 100000000.0
  confidence_threshold: 0.55
  # Entry filters
  momentum_min: 1.02
  volume_spike_min: 1.2
  top_pct: 0.05
  # Portfolio management
  max_positions: 2
  position_pct: 0.5
  # Exit rules
  take_profit: 0.06
  stop_loss: 0.03
  max_hold_days: 5

data:
  period: "5y"
  tickers:
    - "IDX80"
    - "SMC-LIQUID"
  vip_tickers:
    - "WBSA.JK"

paths:
  data_dir: "data"
  artifact_dir: "data/artifacts"
  model_dir: "models"
  db_file: "data/predictions.db"
  picks_file: "data/latest_picks.csv"
  log_file: "app_error.log"

# telegram:
#   token: "YOUR_TOKEN_HERE" # Use env var TELEGRAM_BOT_TOKEN
